services:
  actual:
    image: ghcr.io/actualbudget/actual:26.7.0@sha256:e18b7fbfec6157a368fad4146563f397502e9da70a120aeaeac63b4977405d1c
    environment:
      # Trust traefik and group-proxy
      ACTUAL_TRUSTED_PROXIES: "172.20.20.0/24"
    expose:
      - "5006"
    networks:
      - group-proxy
    restart: unless-stopped
    volumes:
      - /var/lib/docker-compose-runner/actual/data:/data

  traefik:
    volumes:
      - /etc/traefik/dynamic/traefik.actual.yml:/etc/traefik/dynamic/traefik.actual.yml:ro
