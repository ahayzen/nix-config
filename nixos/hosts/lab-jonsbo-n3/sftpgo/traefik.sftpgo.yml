http:
  routers:
    sftpgo:
      rule: Host(`sftpgo.hayzen.uk`)
      service: sftpgo

    webdav:
      rule: Host(`webdav.hayzen.uk`)
      service: webdav

  services:
    sftpgo:
      loadBalancer:
        servers:
          - url: http://sftpgo:8080

    webdav:
      loadBalancer:
        servers:
          - url: http://sftpgo:8090
