services:
  glances:
    image: docker.io/nicolargo/glances:4.5.2@sha256:9ad411687dac6aee071d34f4408e2a9b4d0651acdff4db0544656d0f1224029e
    environment:
      - "GLANCES_OPT=-w -C /etc/glances/glances.conf"
    expose:
      - "61208"
    networks:
      - group-proxy
    restart: unless-stopped
    volumes:
      - /etc/glances/glances.conf:/etc/glances/glances.conf:ro
      - /etc/os-release:/etc/os-release:ro
      - /mnt/pool/cache:/mnt/pool/cache:ro
