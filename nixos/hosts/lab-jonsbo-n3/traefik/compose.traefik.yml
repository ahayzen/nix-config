services:
  traefik:
    image: docker.io/library/traefik:v3.7.8@sha256:4299bbed850421258fc5448c2e0e6ad350981d4d335a68de11b92448aedbefe5
    restart: unless-stopped
    command:
      # Listen for http
      - "--entryPoints.web.address=:80"
      # Listen for https with tls
      #
      # NOTE: If no certificate are set, a default self-signed certificate is generated by Traefik
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"
      # Increase timeouts, this is useful for immich and likely others
      #
      # https://docs.immich.app/administration/reverse-proxy/#traefik-proxy-example-config
      - "--entrypoints.websecure.transport.respondingTimeouts.readTimeout=600s"
      - "--entrypoints.websecure.transport.respondingTimeouts.idleTimeout=600s"
      # Redirect http traffic to https
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      # Trusted VPN IPs so that X-Forwarded-* is passed through
      - "--entryPoints.web.forwardedHeaders.trustedIPs=172.28.228.128/25"
      - "--entryPoints.websecure.forwardedHeaders.trustedIPs=172.28.228.128/25"
      # Enable INFO logging so we know when the service starts
      - "--log.level=INFO"
      # Enable access logging
      - "--accesslog=true"
      # Load configuration from directory
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
    networks:
      - group-proxy
    ports:
      - "80:80"
      - "443:443"
