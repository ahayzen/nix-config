services:
  caddy:
    depends_on:
      - socat-https
    volumes:
      # Caddy configuration file
      - /etc/caddy/sites/rathole.Caddyfile:/etc/caddy/sites/rathole.Caddyfile:ro

  rathole:
    image: docker.io/rapiz1/rathole:v0.5.0@sha256:a31b9178e985d4a84f46d4c3af6aa200ee0c5e7f821c7075a1f6669fb77392b1
    command: --server /etc/rathole/config.toml
    expose:
      # Bitwarden
      - "8080"
      # Immich
      - "8283"
      # Actual
      - "8506"
      # SFTPGo
      - "8880"
      # WebDav
      - "8890"
      # Jellyfin
      - "8896"
      # Audiobookshelf
      - "13378"
      # Vikunja
      - "3456"
      # Paperless
      - "8026"
    networks:
      - group-proxy
      # Needed to open port on server
      - internet
    restart: unless-stopped
    ports:
      # Expose the server
      - "8333:8333"
      # Expose OpenVPN
      - "9194:9194"
    volumes:
      - /etc/rathole/config.toml:/etc/rathole/config.toml:ro

  # Forward wg-quick connections for containers via socat

  socat-https:
    image: docker.io/alpine/socat:1.8.1.3@sha256:188fe0a22182f81c16def9d1137930121eaa3023f427164e32c0d2f118f79dd6
    restart: unless-stopped
    command: "TCP4-LISTEN:9443,fork,reuseaddr TCP4:172.28.228.2:443"
    expose:
      - 9443
    # NOTE: this is not network=host so that caddy container can reach it
    #
    # This creates an outbound connection which is routed through the VPN,
    # which is not possible from caddy directly.
    networks:
      - group-proxy
